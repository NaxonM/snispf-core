name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    name: Verify (test + vet)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  build-core:
    name: Build Core Matrix
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build core artifacts
        run: bash ./scripts/build_release_matrix.sh

      - name: Upload core artifacts
        uses: actions/upload-artifact@v4
        with:
          name: core-release
          path: |
            release/*
          if-no-files-found: error

  build-openwrt:
    name: Build OpenWrt Matrix
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build OpenWrt artifacts
        run: bash ./scripts/build_openwrt_matrix.sh

      - name: Upload OpenWrt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-release
          path: |
            release/openwrt/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-core
      - build-openwrt
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download core artifacts
        uses: actions/download-artifact@v4
        with:
          name: core-release
          path: dist/core

      - name: Download OpenWrt artifacts
        uses: actions/download-artifact@v4
        with:
          name: openwrt-release
          path: dist/openwrt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/core/*
            dist/openwrt/*
          generate_release_notes: true
