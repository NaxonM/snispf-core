name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  verify:
    name: Verify (test + vet)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  build-core:
    name: Build Core Matrix
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build core artifacts
        run: bash ./scripts/build_release_matrix.sh

      - name: Upload core artifacts
        uses: actions/upload-artifact@v4
        with:
          name: core-release
          path: |
            release/*
          if-no-files-found: error

  build-openwrt:
    name: Build OpenWrt Matrix
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build OpenWrt artifacts
        run: bash ./scripts/build_openwrt_matrix.sh

      - name: Upload OpenWrt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-release
          path: |
            release/openwrt/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-core
      - build-openwrt
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download core artifacts
        uses: actions/download-artifact@v4
        with:
          name: core-release
          path: dist/core

      - name: Download OpenWrt artifacts
        uses: actions/download-artifact@v4
        with:
          name: openwrt-release
          path: dist/openwrt

      - name: Prepare release asset names
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/publish

          cp -f dist/core/* dist/publish/

          if [[ -f dist/publish/checksums.txt ]]; then
            mv -f dist/publish/checksums.txt dist/publish/core_checksums.txt
          fi
          if [[ -f dist/publish/release_manifest.json ]]; then
            mv -f dist/publish/release_manifest.json dist/publish/core_release_manifest.json
          fi

          cp -f dist/openwrt/* dist/publish/
          rm -f dist/publish/checksums.txt dist/publish/release_manifest.json

          if [[ -f dist/openwrt/checksums.txt ]]; then
            cp -f dist/openwrt/checksums.txt dist/publish/openwrt_checksums.txt
          fi
          if [[ -f dist/openwrt/release_manifest.json ]]; then
            cp -f dist/openwrt/release_manifest.json dist/publish/openwrt_release_manifest.json
          fi

      - name: Prepare release notes from changelog
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tag="${GITHUB_REF_NAME}"

          awk -v tag="$tag" '
            $0 ~ "^## \\[" tag "\\]" {in_section=1; next}
            in_section && $0 ~ "^## \\[" {exit}
            in_section {print}
          ' CHANGELOG.md > dist/release-notes.md

          if [[ ! -s dist/release-notes.md ]]; then
            {
              echo "Release ${tag}"
              echo
              echo "No changelog section found for ${tag} in CHANGELOG.md."
            } > dist/release-notes.md
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/publish/*
          body_path: dist/release-notes.md
          generate_release_notes: false
